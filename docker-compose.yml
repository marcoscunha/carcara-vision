services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "8221:80"
    environment:
      - REACT_APP_API_URL=http://localhost:8000/api/v1
    depends_on:
      - backend

  # GStreamer Pipeline Manager
  gstreamer:
    build:
      context: ./gstreamer
      dockerfile: Dockerfile
    container_name: gstreamer
    ports:
      - "8085:8085"  # GStreamer API
    environment:
      - MEDIAMTX_HOST=mediamtx
      - MEDIAMTX_RTSP_PORT=8554
      - GSTREAMER_API_PORT=8085
    volumes:
      - ./gstreamer:/app
    devices:
      - /dev/video0:/dev/video0
      - /dev/video4:/dev/video4
      - /dev/dri:/dev/dri  # For hardware acceleration (VAAPI)
    depends_on:
      - mediamtx
    privileged: true
    restart: unless-stopped

  # MediaMTX - Media server for RTSP/WebRTC/HLS
  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: mediamtx
    ports:
      - "8554:8554"   # RTSP
      - "8889:8889"   # WebRTC
      - "8888:8888"   # HLS
      - "1935:1935"   # RTMP
      - "9997:9997"   # API
      - "9998:9998"   # Metrics
    volumes:
      - ./mediamtx/mediamtx.yml:/mediamtx.yml
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - POSTGRES_SERVER=db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=carcara_nvc
      - USE_GPU=true
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility,video
      # Keycloak OAuth2 Configuration
      - KEYCLOAK_URL=http://keycloak:8080
      - KEYCLOAK_ISSUER_URL=http://localhost:8280
      - KEYCLOAK_REALM=carcara
      - KEYCLOAK_CLIENT_ID=carcara-backend
    volumes:
      - ./backend/src:/app/src
    depends_on:
      - db
      - mediamtx
      - gstreamer
      - keycloak
    devices:
      - "/dev/video0:/dev/video0"
      - "/dev/video1:/dev/video1"
      - "/dev/video2:/dev/video2"
      - "/dev/video3:/dev/video3"
    privileged: true
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu, compute, utility, video]

  db:
    image: postgres:15
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=carcara_nvc
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  # Keycloak - Identity and Access Management
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: keycloak
    command: start-dev --import-realm
    environment:
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=admin
      - KC_HTTP_PORT=8080
      - KC_HEALTH_ENABLED=true
    ports:
      - "8280:8080"
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json
      - keycloak_data:/opt/keycloak/data
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  postgres_data:
  keycloak_data:
